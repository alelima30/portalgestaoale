<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Informativos — Village Castelo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0A0C10;
    --gold:#C8A84B;
    --gold-l:#E0C068;
    --green:#1A2E18;
    --green-l:#2D4A28;
    --text:#F0F2F8;
    --text-2:#9BA3AF;
    --slide-time:4000;
  }

  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

  /* ── HEADER ── */
  .header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;
    background:linear-gradient(to bottom,rgba(10,12,16,0.95),transparent);
  }
  .logo{display:flex;align-items:center;gap:12px}
  .logo-mark{
    width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--green),var(--green-l));
    border:1.5px solid rgba(200,168,75,0.5);
    display:flex;align-items:center;justify-content:center;font-size:16px
  }
  .logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;letter-spacing:0.3px}
  .logo-text span{color:var(--gold)}
  .logo-sub{font-size:10px;color:var(--text-2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}

  .header-right{display:flex;align-items:center;gap:16px}
  .edition-badge{
    padding:5px 14px;border-radius:99px;
    background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.3);
    font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.5px
  }
  .btn-back{
    display:flex;align-items:center;gap:6px;
    padding:7px 16px;border-radius:99px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;
    text-decoration:none;transition:all 0.2s
  }
  .btn-back:hover{background:rgba(255,255,255,0.1);color:var(--text)}

  /* ── STAGE ── */
  .stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding:80px 20px 90px;
  }

  .slide-wrap{
    position:relative;
    width:100%;max-width:680px;height:100%;
    display:flex;align-items:center;justify-content:center;
  }

  .slide{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    opacity:0;
    transition:opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1);
    transform:scale(0.97);
    pointer-events:none;
  }
  .slide.active{opacity:1;transform:scale(1);pointer-events:auto}
  .slide.exit-left{opacity:0;transform:scale(0.97) translateX(-30px)}
  .slide.enter-right{opacity:0;transform:scale(0.97) translateX(30px)}

  canvas{
    max-width:100%;max-height:100%;
    border-radius:12px;
    box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    display:block;
  }

  /* Loading */
  .loading{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;z-index:200;transition:opacity 0.5s
  }
  .loading.hide{opacity:0;pointer-events:none}
  .spinner{
    width:48px;height:48px;border-radius:50%;
    border:3px solid rgba(200,168,75,0.2);
    border-top-color:var(--gold);
    animation:spin 0.8s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:14px;color:var(--text-2);letter-spacing:0.5px}

  /* ── PROGRESS BAR ── */
  .progress-bar{
    position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
    width:min(500px,80vw);
    display:flex;flex-direction:column;align-items:center;gap:14px;
    z-index:100;
  }

  /* Dots */
  .dots{display:flex;gap:10px;align-items:center}
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,255,255,0.2);
    cursor:pointer;transition:all 0.3s;border:none;padding:0;
  }
  .dot.active{background:var(--gold);width:28px;border-radius:4px}
  .dot:hover{background:rgba(200,168,75,0.5)}

  /* Barra de tempo */
  .timer-track{
    width:100%;height:3px;border-radius:99px;
    background:rgba(255,255,255,0.1);overflow:hidden
  }
  .timer-fill{
    height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--gold),var(--gold-l));
    width:0%;transition:none;
  }
  .timer-fill.running{
    width:100%;
    transition:width var(--slide-time-css,4s) linear;
  }

  /* ── CONTROLS ── */
  .controls{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:12px;z-index:100;
  }
  .ctrl-btn{
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
    color:var(--text-2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;transition:all 0.2s;
  }
  .ctrl-btn:hover{background:rgba(255,255,255,0.14);color:var(--text)}
  .ctrl-btn.play-pause{
    width:44px;height:44px;
    background:rgba(200,168,75,0.15);border-color:rgba(200,168,75,0.4);
    color:var(--gold);font-size:16px;
  }
  .ctrl-btn.play-pause:hover{background:rgba(200,168,75,0.25)}

  .page-counter{
    font-size:12px;color:var(--text-2);
    padding:6px 14px;border-radius:99px;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    letter-spacing:0.5px;min-width:70px;text-align:center
  }

  /* ── NAV ARROWS (hover laterais) ── */
  .arrow{
    position:fixed;top:50%;transform:translateY(-50%);
    width:48px;height:80px;border-radius:8px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.3);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;transition:all 0.2s;z-index:100;
    opacity:0;
  }
  .arrow:hover{background:rgba(255,255,255,0.1);color:var(--text);opacity:1!important}
  .arrow-left{left:12px}
  .arrow-right{right:12px}
  body:hover .arrow{opacity:0.4}

  /* ── ERROR ── */
  .error-msg{
    text-align:center;padding:40px;
    display:none;flex-direction:column;align-items:center;gap:16px
  }
  .error-msg.show{display:flex}
  .error-icon{font-size:40px}
  .error-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text)}
  .error-sub{font-size:14px;color:var(--text-2);line-height:1.6;max-width:360px}

  @media(max-width:600px){
    .header{padding:10px 16px}
    .stage{padding:70px 8px 85px}
    .logo-sub{display:none}
    .btn-back span{display:none}
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Carregando informativo…</div>
</div>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">🌿</div>
    <div>
      <div class="logo-text">Village <span>Castelo</span></div>
      <div class="logo-sub">Informativos APVC</div>
    </div>
  </div>
  <div class="header-right">
    <div class="edition-badge" id="edition-badge">Informativo</div>
    <a href="index.html" class="btn-back">← <span>Voltar ao Portal</span></a>
  </div>
</header>

<!-- Setas laterais -->
<button class="arrow arrow-left" onclick="prevSlide()" title="Anterior">‹</button>
<button class="arrow arrow-right" onclick="nextSlide()" title="Próximo">›</button>

<!-- Stage -->
<div class="stage">
  <div class="slide-wrap" id="slide-wrap">
    <div class="error-msg" id="error-msg">
      <div class="error-icon">📄</div>
      <div class="error-title">PDF não encontrado</div>
      <div class="error-sub">Verifique se o arquivo PDF está na mesma pasta e passe o nome via <code>?pdf=nome.pdf</code> na URL.</div>
    </div>
  </div>
</div>

<!-- Progress -->
<div class="progress-bar">
  <div class="dots" id="dots"></div>
  <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn" onclick="prevSlide()" title="Anterior">‹</button>
  <button class="ctrl-btn play-pause" id="btn-pp" onclick="togglePause()" title="Pausar">⏸</button>
  <button class="ctrl-btn" onclick="nextSlide()" title="Próximo">›</button>
  <div class="page-counter" id="page-counter">— / —</div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SLIDE_MS   = 4000;
const TRANSITION = 700;

let slides    = [];
let current   = 0;
let paused    = false;
let timer     = null;
let startTime = null;
let remaining = SLIDE_MS;

// Pegar PDF da URL ou usar padrão
function getPdfUrl(){
  const params = new URLSearchParams(location.search);
  return params.get('pdf') || 'informativo.pdf';
}

async function init(){
  const url = getPdfUrl();
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;

    // Detectar edição pelo nome ou conteúdo
    const match = url.match(/EDI[ÇC][ÃA]O[_\s-]*(\d+)/i) || url.match(/edi[cç][aã]o[_\s-]*(\d+)/i);
    if(match) $('edition-badge').textContent = 'Edição ' + match[1];

    const wrap = $('slide-wrap');
    const dotsEl = $('dots');

    for(let i = 1; i <= pdf.numPages; i++){
      const page   = await pdf.getPage(i);
      const scale  = calcScale(page);
      const vp     = page.getViewport({scale});
      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;
      await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;

      const div = document.createElement('div');
      div.className = 'slide' + (i===1?' active':'');
      div.appendChild(canvas);
      wrap.appendChild(div);
      slides.push(div);

      const dot = document.createElement('button');
      dot.className = 'dot' + (i===1?' active':'');
      dot.onclick = () => goTo(i-1);
      dot.title = 'Página ' + i;
      dotsEl.appendChild(dot);
    }

    updateCounter();
    $('loading').classList.add('hide');
    startTimer();

  } catch(e){
    console.error(e);
    $('loading').classList.add('hide');
    $('error-msg').classList.add('show');
  }
}

function calcScale(page){
  const vp = page.getViewport({scale:1});
  const maxW = Math.min(window.innerWidth - 40, 680);
  const maxH = window.innerHeight - 170;
  return Math.min(maxW / vp.width, maxH / vp.height, 2.5);
}

function $(id){ return document.getElementById(id); }

function goTo(idx, direction){
  if(idx === current) return;
  const old = slides[current];
  const neo = slides[idx];

  old.classList.remove('active');
  old.classList.add(direction === 'prev' ? 'enter-right' : 'exit-left');

  neo.style.transform = 'scale(0.97) translateX('+(direction==='prev'?'-30px':'30px')+')';
  neo.style.opacity = '0';
  neo.classList.add('active');

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      neo.style.transition = 'opacity 0.7s ease, transform 0.7s ease';
      neo.style.transform = 'scale(1) translateX(0)';
      neo.style.opacity   = '1';
    });
  });

  setTimeout(()=>{
    old.classList.remove('exit-left','enter-right');
    neo.style.transition = '';
    neo.style.transform  = '';
    neo.style.opacity    = '';
  }, TRANSITION + 50);

  // Dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active', i===idx);
  });

  current = idx;
  updateCounter();
  resetTimer();
}

function nextSlide(){ goTo((current+1) % slides.length, 'next'); }
function prevSlide(){ goTo((current - 1 + slides.length) % slides.length, 'prev'); }

function updateCounter(){
  $('page-counter').textContent = (current+1) + ' / ' + slides.length;
}

// ── Timer / Progress bar ──
function startTimer(){
  clearTimeout(timer);
  if(paused || slides.length <= 1) return;

  const fill = $('timer-fill');
  fill.style.transition = 'none';
  fill.style.width = '0%';

  // Forçar reflow
  fill.getBoundingClientRect();

  fill.style.setProperty('--slide-time-css', (remaining/1000)+'s');
  fill.style.transition = 'width ' + (remaining/1000) + 's linear';
  fill.style.width = '100%';

  startTime = Date.now();
  timer = setTimeout(()=>{ nextSlide(); }, remaining);
}

function resetTimer(){
  remaining = SLIDE_MS;
  startTimer();
}

function pauseTimer(){
  clearTimeout(timer);
  const elapsed = Date.now() - (startTime||Date.now());
  remaining = Math.max(0, remaining - elapsed);
  const fill = $('timer-fill');
  const curr = parseFloat(getComputedStyle(fill).width) / fill.parentElement.offsetWidth * 100;
  fill.style.transition = 'none';
  fill.style.width = curr + '%';
}

function togglePause(){
  paused = !paused;
  $('btn-pp').textContent = paused ? '▶' : '⏸';
  $('btn-pp').title = paused ? 'Retomar' : 'Pausar';
  if(paused){ pauseTimer(); }
  else { remaining = SLIDE_MS; startTimer(); }
}

// Teclado
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextSlide();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevSlide();
  if(e.key===' ') { e.preventDefault(); togglePause(); }
});

// Touch swipe
let touchX = null;
document.addEventListener('touchstart', e=>{ touchX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e=>{
  if(touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50){ dx < 0 ? nextSlide() : prevSlide(); }
  touchX = null;
}, {passive:true});

// Pausar quando mouse parar sobre o slide
document.querySelector('.stage').addEventListener('mouseenter', ()=>{
  if(!paused){ pauseTimer(); }
});
document.querySelector('.stage').addEventListener('mouseleave', ()=>{
  if(!paused){ remaining = SLIDE_MS; startTimer(); }
});

init();
</script>
</body>
</html>
